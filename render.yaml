services:
  - type: web
    name: zsmart-oss-api
    env: node
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node prisma/seed.js && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zsmart-oss-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://zsmart-oss.vercel.app

databases:
  - name: zsmart-oss-db
    databaseName: zsmart_oss
    plan: free
